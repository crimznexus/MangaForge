<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8477FF"/>
      <stop offset="100%" stop-color="#5A18C0"/>
    </linearGradient>
    <filter id="charGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.2" result="f"/>
      <feComposite in="f" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: purple gradient with rounded corners -->
  <rect width="500" height="580" fill="url(#bgGrad)" rx="48"/>

  <!-- Three diagonal stroke lines (氵motif) — left side -->
  <line x1="68"  y1="148" x2="138" y2="228" stroke="rgba(255,255,255,0.55)" stroke-width="16" stroke-linecap="round"/>
  <line x1="52"  y1="268" x2="122" y2="348" stroke="rgba(255,255,255,0.55)" stroke-width="16" stroke-linecap="round"/>
  <line x1="40"  y1="388" x2="110" y2="468" stroke="rgba(255,255,255,0.55)" stroke-width="16" stroke-linecap="round"/>

  <!-- 漫 character — white outline/stroke style -->
  <text x="270" y="385" text-anchor="middle" dominant-baseline="auto"
        font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
        font-size="290" font-weight="900"
        fill="none"
        stroke="white"
        stroke-width="8"
        filter="url(#charGlow)">漫</text>

  <!-- MangaForge title -->
  <text x="250" y="510" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="700"
        fill="white" letter-spacing="2">MangaForge</text>

  <!-- Tagline -->
  <text x="250" y="550" text-anchor="middle"
        font-family="'Courier New',monospace"
        font-size="11" fill="rgba(255,255,255,0.65)" letter-spacing="4">READ · COLLECT · DISCOVER</text>
</svg>
