name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-24.04

    steps:
      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Collect APKs
        run: |
          mkdir -p release-apks
          find app/build/outputs/apk/debug -name "*.apk" -exec sh -c \
            'arch=$(basename "$1" .apk | sed "s/^app-//" | sed "s/-debug$//"); cp "$1" "release-apks/mangaforge-${{ steps.tag.outputs.tag }}-${arch}.apk"' _ {} \;
          ls release-apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: MangaForge ${{ steps.tag.outputs.tag }}
          body: |
            ## MangaForge ${{ steps.tag.outputs.tag }}

            A modern Android manga & webtoon reader built with Kotlin + Jetpack Compose.

            ### Install
            Pick the APK for your device architecture, or use the **universal** build if unsure:
            | APK | Architecture |
            |-----|-------------|
            | `*-arm64-v8a.apk` | Most modern phones (recommended) |
            | `*-armeabi-v7a.apk` | Older 32-bit ARM phones |
            | `*-x86_64.apk` | x86_64 emulators / Chromebooks |
            | `*-universal.apk` | All devices (largest file) |

            > **Note:** Enable *Install unknown apps* in Android settings before sideloading.
          files: release-apks/*.apk
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-beta') }}
